name: CI/CD Pipeline

env:
  DEBUG: "true"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.14
      
      - name: Test backend
        run: |
          pip install .
          pip install ruff
          python -m ruff check .
          pytest

